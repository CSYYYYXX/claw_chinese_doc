<main class="container content"><section class="hero" style="padding:3rem 0;text-align:left;"><h1>Security</h1><p class="hero-subtitle" style="margin:0;">生产环境默认最小权限，先安全再扩展。</p></section>
<section class="section"><h2 class="section-title"><span class="section-title-icon">🔐</span>密钥管理</h2><ul style="margin-left:1.5rem;color:var(--text-secondary);line-height:1.9;"><li>使用环境变量，不在仓库硬编码。</li><li>定期轮换 API Key / Bot Token。</li><li>泄露后立即作废并重新签发。</li></ul></section>
<section class="section"><h2 class="section-title"><span class="section-title-icon">🧱</span>访问控制</h2><ul style="margin-left:1.5rem;color:var(--text-secondary);line-height:1.9;"><li>Dashboard 尽量仅内网访问。</li><li>公网访问需反向代理 + TLS + 身份认证。</li><li>群聊默认开启 <code>requireMention</code>。</li></ul></section>
